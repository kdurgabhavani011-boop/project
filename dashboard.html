<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AI Language Learning</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Language Learning Dashboard</h1>
        <button id="logoutBtn" class="btn">Logout</button>
    </header>
    <main>
        <section class="dashboard">
            <div class="card">
                <h2>Vocabulary Builder</h2>
                <p>Learn new words with AI-generated examples.</p>
                <button class="btn">Start</button>
            </div>
            <div class="card">
                <h2>Grammar Practice</h2>
                <p>Improve your grammar skills with interactive exercises.</p>
                <button class="btn">Start</button>
            </div>
            <div class="card">
                <h2>Speaking Practice</h2>
                <p>Practice pronunciation with AI feedback.</p>
                <button class="btn">Start</button>
            </div>
            <div class="card">
                <h2>Progress Tracking</h2>
                <p>View your learning progress and achievements.</p>
                <button class="btn">View</button>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
